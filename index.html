<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>today, a small planet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #f5efe3;
    font-family: 'Shippori Mincho', 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  canvas {
    display: block;
    position: absolute;
    inset: 0;
  }

  /* ============ UI Overlays ============ */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1s ease, visibility 0s linear 1s;
    z-index: 10;
    text-align: center;
  }

  .overlay.active {
    opacity: 1;
    visibility: visible;
    transition: opacity 1s ease, visibility 0s linear 0s;
    pointer-events: none; /* overlay itself never blocks */
  }

  /* Inner interactive elements re-enable pointer events */
  .overlay.active button,
  .overlay.active input,
  .overlay.active .tap-hint {
    pointer-events: auto;
  }

  #scene-opening {
    z-index: 20;
  }

  #tap-layer {
    position: absolute;
    inset: 0;
    z-index: 25;
    cursor: pointer;
    background: transparent;
    -webkit-tap-highlight-color: transparent;
  }

  .overlay.fade-input {
    pointer-events: auto;
  }

  /* ============ Scene 1: 日常 ============ */
  #scene-opening .line1 {
    display: none;
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #8a8578;
    opacity: 0;
    animation: fadeSlow 3s ease 0.8s forwards;
  }
  #scene-opening .line2 {
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #6a6558;
    margin-top: 1.5rem;
    opacity: 0;
    animation: fadeSlow 3s ease 2.5s forwards;
  }
  #scene-opening .tap-hint {
    position: absolute;
    bottom: 8vh;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: #5a5548;
    opacity: 0;
    animation: pulse 2.5s ease 1.5s infinite;
  }

  @keyframes fadeSlow {
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* ============ Scene 2: Zoom out ============ */
  #scene-zoom .text {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: #f5efe3;
    opacity: 0;
    line-height: 2;
  }
  #scene-zoom .text.show { animation: fadeIn 2.5s ease forwards; }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ============ Scene 3: Earth interaction ============ */
  #scene-earth {
    justify-content: space-between;
    padding: 8vh 2rem 10vh;
  }

  #scene-earth .top-text {
    font-size: clamp(0.95rem, 3.5vw, 1.3rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #f5efe3;
    line-height: 2;
    max-width: 30ch;
    opacity: 0;
    animation: fadeIn 2s ease 0.5s forwards;
  }

  #scene-earth .bottom-hint {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: #8a8578;
    opacity: 0;
    animation: fadeIn 2s ease 2s forwards;
    text-transform: lowercase;
  }

  .next-btn {
    margin-top: 1.5rem;
    padding: 0.9rem 2.2rem;
    background: transparent;
    border: 1px solid rgba(245, 239, 227, 0.4);
    color: #f5efe3;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.4s ease;
    backdrop-filter: blur(4px);
    text-transform: lowercase;
    opacity: 0;
    animation: fadeIn 1.5s ease 4s forwards;
  }

  .next-btn:hover, .next-btn:active {
    background: rgba(245, 239, 227, 0.08);
    border-color: rgba(245, 239, 227, 0.8);
    letter-spacing: 0.4em;
  }

  /* ============ Scene 4: Someone ============ */
  #scene-think {
    justify-content: center;
    gap: 2rem;
  }

  #scene-think .prompt {
    font-size: clamp(1rem, 3.8vw, 1.4rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    line-height: 2;
    max-width: 26ch;
    color: #f5efe3;
  }

  #scene-think .sub {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: #a8a295;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }

  #name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(245, 239, 227, 0.4);
    color: #f5efe3;
    font-family: inherit;
    font-size: 1.1rem;
    text-align: center;
    padding: 0.8rem 1rem;
    width: min(80%, 320px);
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color 0.3s ease;
  }
  #name-input:focus {
    border-bottom-color: #f5c870;
  }
  #name-input::placeholder {
    color: #6a6558;
    font-style: italic;
  }

  /* ============ Scene 5: Message ============ */
  #scene-message .msg {
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    line-height: 2.2;
    max-width: 28ch;
    color: #f5efe3;
    opacity: 0;
  }
  #scene-message .msg.show { animation: fadeIn 3s ease forwards; }

  #scene-message .highlight {
    color: #f5c870;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ============ Scene 6: Future ============ */
  #scene-future {
    justify-content: space-between;
    padding: 10vh 2rem;
  }

  #scene-future .top {
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    letter-spacing: 0.3em;
    color: #8a8578;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  #scene-future .center {
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    line-height: 2.2;
    max-width: 22ch;
    color: #f5efe3;
    opacity: 0;
    animation: fadeIn 3s ease 1.5s forwards;
  }

  #scene-future .bottom {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: #6a6558;
    opacity: 0;
    animation: fadeIn 2s ease 5s forwards;
    text-transform: lowercase;
  }

  /* ============ Restart ============ */
  .restart {
    position: absolute;
    bottom: 3vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: #5a5548;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    opacity: 0;
    transition: opacity 0.5s ease, color 0.3s ease;
    text-transform: lowercase;
  }
  .restart.show { opacity: 0.8; }
  .restart:hover { color: #f5efe3; }

  /* ============ Grain overlay ============ */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  /* ============ Sound toggle ============ */
  .sound-toggle {
    position: absolute;
    top: 3vh;
    right: 4vw;
    background: transparent;
    border: 1px solid rgba(245, 239, 227, 0.2);
    color: #8a8578;
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
    z-index: 50;
    transition: all 0.3s ease;
    border-radius: 2px;
    text-transform: lowercase;
  }
  .sound-toggle:hover {
    color: #f5efe3;
    border-color: rgba(245, 239, 227, 0.5);
  }
</style>
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>

  <!-- Scene 1: 日常 -->
  <div class="overlay active" id="scene-opening">
    <div class="line1"></div>
    <div class="line2">— あなたは何をしていますか</div>
    <div class="tap-hint">tap to begin</div>
  </div>
  <div id="tap-layer"></div>

  <!-- Scene 2: Zoom out -->
  <div class="overlay" id="scene-zoom">
    <div class="text" id="zoom-text"></div>
  </div>

  <!-- Scene 3: Earth (interactive) -->
  <div class="overlay" id="scene-earth">
    <div class="top-text"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
      <div class="bottom-hint">drag to spin</div>
      <button class="next-btn" id="earth-next-btn">continue</button>
    </div>
  </div>

  <!-- Scene 4: Think of someone -->
  <div class="overlay" id="scene-think">
    <div class="prompt">
      誰かを思い浮かべてください
    </div>
    <input type="text" id="name-input" placeholder="write a name, or a memory, a wish" maxlength="40">
    <button class="next-btn" id="send-btn" style="opacity:1;animation:none;">send</button>
  </div>

  <!-- Scene 5: Message after sending -->
  <div class="overlay" id="scene-message">
    <div class="msg" id="msg-text"></div>
  </div>

  <!-- Scene 6: Future -->
  <div class="overlay" id="scene-future">
    <div class="top">one year, ten years, a thousand years from now —</div>
    <div class="center" id="future-text">
      地球は少しだけ<br>やさしくなっている<br>かもしれない
    </div>
    <div class="bottom">— earth day, 2026</div>
  </div>

  <button class="restart" id="restart-btn">back</button>
  <button class="sound-toggle" id="sound-btn">♪ sound off</button>
  <div class="grain"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }

<script type="module">
import * as THREE from 'three';

// ============ Global state ============
let scene, camera, renderer, earth, clouds, atmosphere, stars, glowGroup;
let rotationVelocity = 0;
let targetRotationY = 0;
let isDragging = false;
let lastPointerX = 0;
let currentScene = 'opening';
let cameraTargetZ = 15;
let cameraZ = 15;
let scrollPhase = 0; // 0 = far, 1 = close
let thoughtLights = [];
let arcLines = [];
let openingTriggered = false;

// ============ Audio (Tone.js-less ambient) ============
let audioCtx;
let masterGain;
let soundOn = false;
let ambientNodes = [];

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);
  } catch(e) { console.log('audio unavailable'); }
}

function startAmbient() {
  if (!audioCtx) return;
  // Gentle drone: two detuned sine waves + slow LFO
  const freqs = [110, 164.81, 220]; // A2, E3, A3
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = f;

    lfo.frequency.value = 0.1 + i * 0.05;
    lfoGain.gain.value = 0.015;
    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);

    gain.gain.value = 0.04 - i * 0.01;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    lfo.start();
    ambientNodes.push(osc, lfo);
  });
  // Fade in
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 3);
}

function playChime() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [523.25, 659.25, 783.99].forEach((freq, i) => { // C5 E5 G5
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now + i * 0.15);
    gain.gain.linearRampToValueAtTime(0.08, now + i * 0.15 + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 2);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now + i * 0.15);
    osc.stop(now + i * 0.15 + 2);
  });
}

window.toggleSound = function() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  soundOn = !soundOn;
  const btn = document.getElementById('sound-btn');
  if (soundOn) {
    if (ambientNodes.length === 0) startAmbient();
    else {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 1.5);
    }
    btn.textContent = '♪ sound on';
  } else {
    if (masterGain) {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    }
    btn.textContent = '♪ sound off';
  }
};

// ============ Three.js setup ============
function init() {
  const canvas = document.getElementById('canvas');
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.02);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 15;

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);

  // === Lights ===
  const ambient = new THREE.AmbientLight(0x222233, 0.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff0dd, 1.8);
  sun.position.set(5, 2, 5);
  scene.add(sun);

  const rim = new THREE.DirectionalLight(0x4477aa, 0.6);
  rim.position.set(-5, -1, -3);
  scene.add(rim);

  // === Starfield ===
  const starGeo = new THREE.BufferGeometry();
  const starCount = 3000;
  const starPositions = new Float32Array(starCount * 3);
  const starColors = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 200 + Math.random() * 300;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i*3+2] = r * Math.cos(phi);
    const c = 0.7 + Math.random() * 0.3;
    const warm = Math.random() > 0.8 ? 0.85 : 1;
    starColors[i*3] = c * warm;
    starColors[i*3+1] = c * (warm * 0.95);
    starColors[i*3+2] = c;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
  const starMat = new THREE.PointsMaterial({
    size: 0.8, vertexColors: true, transparent: true, opacity: 0.9,
    sizeAttenuation: true, depthWrite: false
  });
  stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // === Earth (procedural, no external textures) ===
  const earthGeo = new THREE.SphereGeometry(3, 128, 128);

  // Create procedural earth texture via canvas
  const earthTexture = createEarthTexture();
  const nightTexture = createNightTexture();

  const earthMat = new THREE.ShaderMaterial({
    uniforms: {
      dayMap: { value: earthTexture },
      nightMap: { value: nightTexture },
      sunDirection: { value: new THREE.Vector3(5, 2, 5).normalize() },
      time: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPos = worldPos.xyz;
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `,
    fragmentShader: `
      uniform sampler2D dayMap;
      uniform sampler2D nightMap;
      uniform vec3 sunDirection;
      uniform float time;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vWorldPos;

      void main() {
        vec3 n = normalize(vNormal);
        float sunDot = dot(n, sunDirection);
        float mixer = smoothstep(-0.2, 0.2, sunDot);

        vec3 dayCol = texture2D(dayMap, vUv).rgb;
        vec3 nightCol = texture2D(nightMap, vUv).rgb;

        // Soft terminator warmth
        float warmth = 1.0 - smoothstep(-0.1, 0.3, abs(sunDot));
        vec3 warmCol = mix(dayCol, dayCol * vec3(1.3, 1.05, 0.85), warmth * 0.6);

        vec3 color = mix(nightCol, warmCol, mixer);

        // Add subtle fresnel for atmosphere feel at edges
        float fresnel = pow(1.0 - abs(dot(n, vec3(0.0, 0.0, 1.0))), 2.5);
        color += vec3(0.3, 0.5, 0.8) * fresnel * 0.25;

        gl_FragColor = vec4(color, 1.0);
      }
    `
  });

  earth = new THREE.Mesh(earthGeo, earthMat);
  scene.add(earth);

  // === Clouds ===
  const cloudGeo = new THREE.SphereGeometry(3.05, 64, 64);
  const cloudTexture = createCloudTexture();
  const cloudMat = new THREE.MeshPhongMaterial({
    map: cloudTexture,
    transparent: true,
    opacity: 0.45,
    depthWrite: false
  });
  clouds = new THREE.Mesh(cloudGeo, cloudMat);
  scene.add(clouds);

  // === Atmosphere glow ===
  const atmGeo = new THREE.SphereGeometry(3.3, 64, 64);
  const atmMat = new THREE.ShaderMaterial({
    uniforms: {
      glowColor: { value: new THREE.Color(0x6ab0ff) }
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vPositionNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPositionNormal = normalize((modelViewMatrix * vec4(position, 1.0)).xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 glowColor;
      varying vec3 vNormal;
      varying vec3 vPositionNormal;
      void main() {
        float intensity = pow(1.0 - abs(dot(vNormal, vPositionNormal)), 3.0);
        gl_FragColor = vec4(glowColor, 1.0) * intensity * 0.9;
      }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true,
    depthWrite: false
  });
  atmosphere = new THREE.Mesh(atmGeo, atmMat);
  scene.add(atmosphere);

  // Group for thought lights
  glowGroup = new THREE.Group();
  earth.add(glowGroup);

  // Start earth invisible (we zoom in from black)
  earth.scale.setScalar(0.001);
  clouds.scale.setScalar(0.001);
  atmosphere.scale.setScalar(0.001);

  window.addEventListener('resize', onResize);
  setupInteraction();
  animate();
}

// ============ Texture generators ============
function createEarthTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048; canvas.height = 1024;
  const ctx = canvas.getContext('2d');

  // Ocean base gradient
  const oceanGrad = ctx.createLinearGradient(0, 0, 0, 1024);
  oceanGrad.addColorStop(0, '#0a2a4a');
  oceanGrad.addColorStop(0.3, '#1a4a7a');
  oceanGrad.addColorStop(0.5, '#1f5a8a');
  oceanGrad.addColorStop(0.7, '#1a4a7a');
  oceanGrad.addColorStop(1, '#0a2a4a');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, 2048, 1024);

  // Add ocean noise
  for (let i = 0; i < 4000; i++) {
    const x = Math.random() * 2048;
    const y = Math.random() * 1024;
    const r = Math.random() * 3;
    ctx.fillStyle = `rgba(${100+Math.random()*50}, ${150+Math.random()*60}, ${200+Math.random()*55}, ${Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Continents (stylized blobs)
  const continents = [
    // [x, y, w, h, rotation]
    // Africa
    { x: 1100, y: 500, scale: 1, color: '#4a6b3a' },
    // Europe / Asia
    { x: 1250, y: 380, scale: 1.6, color: '#5a7a4a' },
    // Americas
    { x: 500, y: 450, scale: 1.2, color: '#4a6b3a' },
    { x: 450, y: 650, scale: 0.9, color: '#5a7540' },
    // Australia
    { x: 1650, y: 700, scale: 0.7, color: '#7a6a3a' },
  ];

  continents.forEach(c => {
    drawContinent(ctx, c.x, c.y, c.scale, c.color);
  });

  // Polar ice
  const iceGrad1 = ctx.createLinearGradient(0, 0, 0, 120);
  iceGrad1.addColorStop(0, 'rgba(240, 248, 255, 0.95)');
  iceGrad1.addColorStop(1, 'rgba(240, 248, 255, 0)');
  ctx.fillStyle = iceGrad1;
  ctx.fillRect(0, 0, 2048, 120);

  const iceGrad2 = ctx.createLinearGradient(0, 900, 0, 1024);
  iceGrad2.addColorStop(0, 'rgba(240, 248, 255, 0)');
  iceGrad2.addColorStop(1, 'rgba(240, 248, 255, 0.95)');
  ctx.fillStyle = iceGrad2;
  ctx.fillRect(0, 900, 2048, 124);

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.anisotropy = 8;
  return tex;
}

function drawContinent(ctx, cx, cy, scale, color) {
  // Stylized organic continent shape
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const points = 20;
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < points; i++) {
    const angle = (i / points) * Math.PI * 2;
    const r = 80 + Math.sin(i * 1.7) * 50 + Math.cos(i * 2.3) * 40 + Math.random() * 30;
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r * 0.9;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // Texture variation
  for (let i = 0; i < 150; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 100;
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r * 0.9;
    ctx.fillStyle = `rgba(${60+Math.random()*40}, ${100+Math.random()*40}, ${50+Math.random()*30}, ${Math.random() * 0.4})`;
    ctx.beginPath();
    ctx.arc(x, y, 2 + Math.random() * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Darker edges for depth
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 60 + Math.random() * 40;
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r * 0.9;
    ctx.fillStyle = `rgba(30, 50, 25, ${Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, 3 + Math.random() * 5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function createNightTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 512;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#020612';
  ctx.fillRect(0, 0, 1024, 512);

  // City lights clusters — suggestive of inhabited continents
  const lightClusters = [
    { x: 625, y: 250, count: 200, spread: 80 }, // Africa
    { x: 650, y: 180, count: 400, spread: 120 }, // Europe/Asia
    { x: 780, y: 210, count: 300, spread: 90 },  // East Asia
    { x: 250, y: 225, count: 250, spread: 100 }, // Americas
    { x: 225, y: 325, count: 150, spread: 70 },  // S America
    { x: 825, y: 350, count: 80, spread: 50 },   // Australia
  ];

  lightClusters.forEach(cluster => {
    for (let i = 0; i < cluster.count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * cluster.spread;
      const x = cluster.x + Math.cos(angle) * r;
      const y = cluster.y + Math.sin(angle) * r;
      const brightness = 0.3 + Math.random() * 0.7;
      const size = 0.5 + Math.random() * 1.5;

      const grad = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
      grad.addColorStop(0, `rgba(255, 220, 140, ${brightness})`);
      grad.addColorStop(0.5, `rgba(255, 180, 80, ${brightness * 0.4})`);
      grad.addColorStop(1, 'rgba(255, 150, 50, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, size * 3, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

function createCloudTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 512;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 1024, 512);

  // Swirling cloud formations
  for (let i = 0; i < 40; i++) {
    const cx = Math.random() * 1024;
    const cy = Math.random() * 512;
    const baseR = 30 + Math.random() * 80;

    for (let j = 0; j < 30; j++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * baseR;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r * 0.6;
      const size = 10 + Math.random() * 25;
      const alpha = 0.15 + Math.random() * 0.25;

      const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
      grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
      grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

// ============ Interaction ============
function setupInteraction() {
  const canvas = document.getElementById('canvas');

  const onDown = (e) => {
    if (currentScene !== 'earth' && currentScene !== 'think' && currentScene !== 'message' && currentScene !== 'future') return;
    isDragging = true;
    lastPointerX = e.clientX || (e.touches && e.touches[0].clientX);
  };
  const onMove = (e) => {
    if (!isDragging) return;
    const x = e.clientX || (e.touches && e.touches[0].clientX);
    const dx = x - lastPointerX;
    rotationVelocity = dx * 0.005;
    lastPointerX = x;
  };
  const onUp = () => { isDragging = false; };

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(e); }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, { passive: false });
  canvas.addEventListener('touchend', onUp);

  // Opening tap — dedicated tap layer, always on top, cannot fail
  const tapLayer = document.getElementById('tap-layer');
  const handleOpeningTap = (e) => {
    if (openingTriggered || currentScene !== 'opening') return;
    openingTriggered = true;
    if (e) e.preventDefault();
    // Remove the tap layer so it doesn't block later interactions
    tapLayer.style.display = 'none';
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    goToZoom();
  };
  tapLayer.addEventListener('click', handleOpeningTap);
  tapLayer.addEventListener('touchstart', handleOpeningTap, { passive: false });
  tapLayer.addEventListener('pointerdown', handleOpeningTap);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============ Scene transitions ============
function showScene(id) {
  document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('scene-' + id);
  if (el) el.classList.add('active');
  currentScene = id;
}

window.goToZoom = function() {
  showScene('zoom');
  // Start zoom-in animation: earth scales up from tiny
  const zoomText = document.getElementById('zoom-text');
  const lines = [
    '部屋から、',
    '街から、国から、',
    'そして、',
    'この星が見えた。'
  ];
  let idx = 0;
  zoomText.innerHTML = '';
  const showNext = () => {
    if (idx < lines.length) {
      zoomText.innerHTML = lines[idx];
      zoomText.classList.remove('show');
      void zoomText.offsetWidth;
      zoomText.classList.add('show');
      idx++;
      setTimeout(showNext, 2500);
    } else {
      setTimeout(() => goToEarth(), 2000);
    }
  };
  showNext();

  // Animate earth scale
  const startTime = performance.now();
  const duration = 10000;
  const animateScale = () => {
    const t = Math.min((performance.now() - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const scale = eased;
    earth.scale.setScalar(scale);
    clouds.scale.setScalar(scale);
    atmosphere.scale.setScalar(scale);
    cameraTargetZ = 15 - eased * 7;
    if (t < 1) requestAnimationFrame(animateScale);
  };
  animateScale();
};

window.goToEarth = function() {
  showScene('earth');
  cameraTargetZ = 8;
};

window.goToThink = function() {
  showScene('think');
  cameraTargetZ = 7;
  setTimeout(() => {
    document.getElementById('name-input').focus();
  }, 500);
};

window.sendThought = function() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  // Proceed even if empty — you can still just "think" of someone

  // Spawn a light on earth surface
  spawnThoughtLight();

  // Show message
  const msgEl = document.getElementById('msg-text');
  const displayName = name || 'あの人';
  msgEl.innerHTML = `あなたの想いは、<br>今、<span class="highlight">${escapeHtml(displayName)}</span>へ<br>地球をひと巡りしました。`;

  showScene('message');
  msgEl.classList.remove('show');
  void msgEl.offsetWidth;
  msgEl.classList.add('show');

  playChime();

  setTimeout(() => goToFuture(), 6000);
};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function spawnThoughtLight() {
  // Two points on earth surface, connected by an arc
  const theta1 = Math.random() * Math.PI * 2;
  const phi1 = Math.acos(2 * Math.random() - 1);
  const theta2 = Math.random() * Math.PI * 2;
  const phi2 = Math.acos(2 * Math.random() - 1);

  const r = 3.02;
  const p1 = new THREE.Vector3(
    r * Math.sin(phi1) * Math.cos(theta1),
    r * Math.cos(phi1),
    r * Math.sin(phi1) * Math.sin(theta1)
  );
  const p2 = new THREE.Vector3(
    r * Math.sin(phi2) * Math.cos(theta2),
    r * Math.cos(phi2),
    r * Math.sin(phi2) * Math.sin(theta2)
  );

  // Glowing point sprites
  const spriteMat = new THREE.SpriteMaterial({
    map: createGlowTexture(),
    color: 0xffd97a,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false
  });

  [p1, p2].forEach(p => {
    const sprite = new THREE.Sprite(spriteMat.clone());
    sprite.position.copy(p);
    sprite.scale.set(0.001, 0.001, 0.001);
    glowGroup.add(sprite);
    thoughtLights.push({ sprite, birth: performance.now() });
  });

  // Arc between the two points
  const arcPoints = [];
  const steps = 60;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const p = new THREE.Vector3().lerpVectors(p1, p2, t);
    // Lift into arc
    const lift = Math.sin(t * Math.PI) * 1.2;
    p.normalize().multiplyScalar(r + lift);
    arcPoints.push(p);
  }
  const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPoints);
  const arcMat = new THREE.LineBasicMaterial({
    color: 0xffd97a,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending
  });
  const arc = new THREE.Line(arcGeo, arcMat);
  glowGroup.add(arc);
  arcLines.push({ line: arc, birth: performance.now() });
}

function createGlowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  grad.addColorStop(0, 'rgba(255, 240, 180, 1)');
  grad.addColorStop(0.3, 'rgba(255, 200, 100, 0.6)');
  grad.addColorStop(1, 'rgba(255, 150, 50, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(canvas);
}

window.goToFuture = function() {
  showScene('future');
  cameraTargetZ = 11;
  // Cycle future texts
  const futureEl = document.getElementById('future-text');
  const futures = [
    '地球は少しだけ<br>やさしくなっている<br>かもしれない',
    'あなたが<br>一瞬でも誰かを<br>思ったあの時間が<br>世界を変える'
  ];
  let i = 0;
  const cycle = () => {
    if (currentScene !== 'future') return;
    futureEl.style.opacity = 0;
    setTimeout(() => {
      futureEl.innerHTML = futures[i % futures.length];
      futureEl.style.opacity = 1;
      i++;
    }, 1500);
  };
  setTimeout(cycle, 8000);
  setTimeout(cycle, 16000);

  // Show restart
  setTimeout(() => {
    document.querySelector('.restart').classList.add('show');
  }, 6000);
};

window.restart = function() {
  document.querySelector('.restart').classList.remove('show');
  document.getElementById('name-input').value = '';
  // Clear thought lights
  thoughtLights.forEach(t => glowGroup.remove(t.sprite));
  arcLines.forEach(a => glowGroup.remove(a.line));
  thoughtLights = [];
  arcLines = [];
  earth.scale.setScalar(0.001);
  clouds.scale.setScalar(0.001);
  atmosphere.scale.setScalar(0.001);
  cameraTargetZ = 15;
  // Restore tap layer
  const tapLayer = document.getElementById('tap-layer');
  tapLayer.style.display = 'block';
  openingTriggered = false;
  showScene('opening');
};

// ============ Animate loop ============
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Earth rotation
  if (currentScene === 'earth' || currentScene === 'think' || currentScene === 'message' || currentScene === 'future') {
    if (!isDragging) {
      rotationVelocity *= 0.95;
      // Gentle auto-rotation
      earth.rotation.y += 0.0008 + rotationVelocity;
      clouds.rotation.y += 0.001 + rotationVelocity * 0.9;
    } else {
      earth.rotation.y += rotationVelocity;
      clouds.rotation.y += rotationVelocity * 0.9;
    }
  } else {
    earth.rotation.y += 0.0005;
    clouds.rotation.y += 0.0006;
  }

  // Camera ease
  cameraZ += (cameraTargetZ - cameraZ) * 0.02;
  camera.position.z = cameraZ;

  // Stars gentle rotation
  stars.rotation.y += 0.00005;

  // Thought lights: fade in, stay bright
  const now = performance.now();
  thoughtLights.forEach(t => {
    const age = (now - t.birth) / 1000;
    const pulse = 0.08 + Math.sin(age * 2) * 0.02;
    const baseScale = Math.min(age / 1.5, 1) * pulse;
    t.sprite.scale.setScalar(baseScale * 4);
  });
  arcLines.forEach(a => {
    const age = (now - a.birth) / 1000;
    a.line.material.opacity = Math.min(age / 1.2, 1) * (0.5 + Math.sin(age * 1.5) * 0.2);
  });

  renderer.render(scene, camera);
}

init();

// Wire up all buttons (module scripts can't be called from onclick attrs)
document.getElementById('sound-btn').addEventListener('click', toggleSound);
document.getElementById('restart-btn').addEventListener('click', restart);
document.getElementById('earth-next-btn').addEventListener('click', goToThink);
document.getElementById('send-btn').addEventListener('click', sendThought);

// Allow Enter key on input
document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendThought();
});
</script>
